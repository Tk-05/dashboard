              url: http://100.127.101.14/ui/dashboard
              icon: /assets/truenas-logo.png
            - title: Pihole
              url: http://100.116.40.19/admin
              icon: /assets/pihole-logo.png
            - title: Proxmox
              url: https://100.84.63.20:8006/#v1:0:18:4
              icon: /assets/proxmox-logo.png
            - title: Nginx
              url: http://100.84.59.4:81/
